<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloomstall Reminders</title>
    
    <meta name="apple-mobile-web-app-title" content="Bloomstall Reminders">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body { font-family: -apple-system, sans-serif; background: #f8d1c6; padding: 0; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Updated Banner Style */
        #install-guide { background: #00382f; color: white; padding: 15px; text-align: center; font-size: 0.85em; width: 100%; box-sizing: border-box; display: none; border-bottom: 2px solid #f8d1c6; line-height: 1.4; }
        
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 90%; max-width: 380px; margin-top: 20px; border: 1px solid #fce4ec; }
        h2 { color: #00382f; text-align: center; margin-bottom: 25px; font-weight: 700; text-transform: uppercase; }
        label { font-size: 0.9em; color: #555; font-weight: 600; display: block; margin-top: 15px; }
        input, button { width: 100%; padding: 15px; margin-top: 8px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 1rem; }
        button { background: #00382f; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 30px; }
        .footer-note { font-size: 0.8em; color: #444; text-align: center; margin-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>

<div id="install-guide">
    <strong>INSTALL ON YOUR PHONE:</strong> Tap the SHARE icon [↑] and select <strong>'Add to Home Screen'</strong> to save this tool.
</div>

<div class="container">
    <h2>Create a Reminder</h2>
    <label for="eventDate">When is the big day?</label>
    <input type="date" id="eventDate">
    <label for="eventNote">Who/What are we celebrating?</label>
    <input type="text" id="eventNote" placeholder="e.g. Mom's Birthday">
    <label for="daysBefore">Remind me how many days before?</label>
    <input type="number" id="daysBefore" value="5">
    <label for="extraNotes">Extra Notes (Optional)</label>
    <input type="text" id="extraNotes" placeholder="Arrangement style, etc.">
    <button onclick="generateReminder()">Add to Phone Reminders</button>
    <div class="footer-note">Adds a reminder with a link to Bloomstall.com directly to your phone.</div>
</div>

<script>
    // Show banner if not in standalone mode
    if (window.navigator.standalone === false || (!window.matchMedia('(display-mode: standalone)').matches && !window.navigator.standalone)) {
        document.getElementById('install-guide').style.display = 'block';
    }

    function generateReminder() {
        const shopUrl = "https://bloomstall.com"; 
        const dateVal = document.getElementById('eventDate').value;
        const note = document.getElementById('eventNote').value;
        const extra = document.getElementById('extraNotes').value;
        const daysBefore = document.getElementById('daysBefore').value;

        if (!dateVal || !note) { alert("Please select a date and enter a name."); return; }

        const cleanDate = dateVal.replace(/-/g, "");
        const notesSection = extra ? `\\nNotes: ${extra}` : "";
        const fullDescription = `It's almost time for ${note}!${notesSection}\\n\\nOrder here: ${shopUrl}`;
        
        const icsContent = [
            "BEGIN:VCALENDAR",
            "VERSION:2.0",
            "BEGIN:VEVENT",
            `DTSTART;VALUE=DATE:${cleanDate}`,
            `DTEND;VALUE=DATE:${cleanDate}`,
            `SUMMARY:Order flowers for: ${note}`,
            `DESCRIPTION:${fullDescription}`,
            `URL:${shopUrl}`,
            "BEGIN:VALARM",
            `TRIGGER:-P${daysBefore}D`,
            "ACTION:DISPLAY",
            `DESCRIPTION:Reminder: Order flowers for ${note}`,
            "END:VALARM",
            "END:VEVENT",
            "END:VCALENDAR"
        ].join("\n");

        const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
        const link = document.createElement('a');
        link.href = window.URL.createObjectURL(blob);
        link.setAttribute('download', 'bloomstall-reminder.ics');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
