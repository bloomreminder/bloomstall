<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloomstall Special Day Reminders</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fdf6f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 380px; border: 1px solid #fce4ec; }
        h2 { color: #efa8ab text-align: center; margin-bottom: 25px; font-weight: 700; }
        label { font-size: 0.9em; color: #777; font-weight: 600; display: block; margin-top: 15px; }
        input, button { width: 100%; padding: 15px; margin-top: 8px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: #d63384; outline: none; background: #fffafb; }
        button { background: #d63384; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 30px; box-shadow: 0 4px 12px rgba(214, 51, 132, 0.2); }
        button:active { transform: scale(0.98); }
        .footer-note { font-size: 0.8em; color: #000000; text-align: center; margin-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h2>CREATE A "SEND FLOWERS" REMINDER</h2>
    
    <label for="eventDate">When is the big day?</label>
    <input type="date" id="eventDate">

    <label for="eventNote">Who are we celebrating?</label>
    <input type="text" id="eventNote" placeholder="e.g. Mom's Birthday">

    <label for="daysBefore">Remind me how many days before?</label>
    <input type="number" id="daysBefore" value="5" min="1">

    <label for="notes">Notes</label>
    <input type="text" id="eventNote" placeholder="e.g. Favorite flower, favorite Bloomstall arrangement, favorite color, etc.">

    <button onclick="generateReminder()">Add to Phone Reminders</button>
    
    <div class="footer-note">Selecting this adds a reminder with a link to Bloomstall.com directly into your phone.</div>
</div>

<script>
function generateReminder() {
    // --- CONFIGURE YOUR WEBSITE HERE ---
    const shopUrl = "https://bloomstall.com"; 
    // ------------------------------------

    const dateVal = document.getElementById('eventDate').value;
    const note = document.getElementById('eventNote').value;
    const daysBefore = document.getElementById('daysBefore').value;

    if (!dateVal || !note) {
        alert("Please select a date and enter a name.");
        return;
    }

    const cleanDate = dateVal.replace(/-/g, "");
    
    const icsContent = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "BEGIN:VEVENT",
        `DTSTART;VALUE=DATE:${cleanDate}`,
        `DTEND;VALUE=DATE:${cleanDate}`,
        `SUMMARY:Order flowers for: ${note}`,
        `DESCRIPTION:It's almost time for ${note}! Tap the link to order flowers: ${shopUrl}`,
        `URL:${shopUrl}`,
        "BEGIN:VALARM",
        `TRIGGER:-P${daysBefore}D`,
        "ACTION:DISPLAY",
        `DESCRIPTION:Reminder: Order flowers for ${note}`,
        "END:VALARM",
        "END:VEVENT",
        "END:VCALENDAR"
    ].join("\n");

    const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
    const link = document.createElement('a');
    link.href = window.URL.createObjectURL(blob);
    link.setAttribute('download', 'flower-reminder.ics');
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
